name: Backup Supabase to Google Drive

on:
  schedule:
    # Runs daily at 02:00 WIB (19:00 UTC).
    - cron: '0 19 * * *'
  workflow_dispatch:

env:
  BACKUP_PREFIX: guru-cerdas-db
  RETENTION_DAYS: 90

jobs:
  backup-database:
    name: Backup database
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      PGSSLMODE: require

    steps:
      - name: Validate required secrets
        run: |
          missing=0

          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Missing GitHub secret: SUPABASE_DB_URL"
            missing=1
          fi

          if [ -z "$GDRIVE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing GitHub secret: GDRIVE_SERVICE_ACCOUNT_JSON"
            missing=1
          fi

          if [ -z "$GDRIVE_FOLDER_ID" ]; then
            echo "Missing GitHub secret: GDRIVE_FOLDER_ID"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install backup tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client rclone

      - name: Configure Google Drive remote
        run: |
          service_account_file="$RUNNER_TEMP/gdrive-service-account.json"
          rclone_config="$RUNNER_TEMP/rclone.conf"

          printf '%s' "$GDRIVE_SERVICE_ACCOUNT_JSON" > "$service_account_file"

          cat > "$rclone_config" <<EOF
          [gdrive]
          type = drive
          scope = drive
          service_account_file = $service_account_file
          root_folder_id = $GDRIVE_FOLDER_ID
          EOF

          echo "RCLONE_CONFIG=$rclone_config" >> "$GITHUB_ENV"

      - name: Create PostgreSQL backup
        run: |
          mkdir -p backups

          timestamp="$(TZ=Asia/Jakarta date +'%Y-%m-%d_%H-%M-%S_WIB')"
          backup_file="backups/${BACKUP_PREFIX}-${timestamp}.dump"

          pg_dump "$SUPABASE_DB_URL" \
            --format=custom \
            --compress=9 \
            --no-owner \
            --no-privileges \
            --file="$backup_file"

          if [ ! -s "$backup_file" ]; then
            echo "Backup file is empty or missing"
            exit 1
          fi

          sha256sum "$backup_file" > "${backup_file}.sha256"
          echo "BACKUP_FILE=$backup_file" >> "$GITHUB_ENV"
          echo "CHECKSUM_FILE=${backup_file}.sha256" >> "$GITHUB_ENV"

      - name: Upload backup to Google Drive
        run: |
          rclone copy "$BACKUP_FILE" gdrive: --config "$RCLONE_CONFIG" --progress
          rclone copy "$CHECKSUM_FILE" gdrive: --config "$RCLONE_CONFIG" --progress

      - name: Verify uploaded backup exists
        run: |
          backup_name="$(basename "$BACKUP_FILE")"
          checksum_name="$(basename "$CHECKSUM_FILE")"

          rclone lsf gdrive: --config "$RCLONE_CONFIG" | grep -Fx "$backup_name"
          rclone lsf gdrive: --config "$RCLONE_CONFIG" | grep -Fx "$checksum_name"

      - name: Delete old backups from Google Drive
        run: |
          rclone delete gdrive: \
            --config "$RCLONE_CONFIG" \
            --min-age "${RETENTION_DAYS}d" \
            --include "${BACKUP_PREFIX}-*.dump" \
            --include "${BACKUP_PREFIX}-*.dump.sha256"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: database-backup
          path: backups/
          retention-days: 7
