  <style>
    /* Critical FOUC-prevention styles — non-critical styles in src/styles/shellStyles.css */
    * {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    html {
      touch-action: pan-x pan-y;
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
      -moz-text-size-adjust: 100%;
      overflow: hidden;
      height: 100%;
    }

    body {
      overscroll-behavior-y: none;
      -webkit-overflow-scrolling: touch;
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f8fafc;
      font-feature-settings: "cv11", "ss01";
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .dark body {
      background: #0f172a;
    }

    #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
      -webkit-overflow-scrolling: touch;
    }
  </style>
  <script>
    // Theme management script to prevent flash of wrong theme
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }

    // Prevent double-tap zoom (improves tap responsiveness without blocking accessibility zoom)
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);

    // Prevent pinch-zoom (multi-touch)
    document.addEventListener('touchstart', function (event) {
      if (event.touches.length > 1) {
        event.preventDefault();
      }
    }, { passive: false });

    // Prevent gesture zoom (iOS Safari)
    document.addEventListener('gesturestart', function (event) {
      event.preventDefault();
    });
  </script>
